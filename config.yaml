# Mockup Generator Config
# ─────────────────────────────────────────────────────────────
# Run locate.py on each template to find placement coordinates:
#   venv/bin/python3 locate.py templates/your_frame.png
#
# fit_mode options:
#   stretch  — fill the placement area exactly (default)
#   fit      — maintain aspect ratio, letterbox with white padding
#   fill     — maintain aspect ratio, crop to fill
# ─────────────────────────────────────────────────────────────

output_dir: output

variants:
  - name: medium_white_frame
    template: templates/medium_white_frame.png
    fit_mode: stretch
    placement:
      x: 312
      y: 172
      width: 657
      height: 932

  - name: medium_black_frame
    template: templates/medium_black_frame.png
    fit_mode: stretch
    placement:
      x: 312
      y: 172
      width: 657
      height: 932

  - name: medium_o_frame
    template: templates/medium_o_frame.png
    fit_mode: stretch
    placement:
      x: 312
      y: 172
      width: 657
      height: 932
