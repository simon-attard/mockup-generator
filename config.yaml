# Mockup Generator Config
# ─────────────────────────────────────────────────────────────
# Run locate.py on each template to find placement coordinates:
#   python locate.py templates/white_frame.png
#
# fit_mode options:
#   stretch  — fill the placement area exactly (default, good when artwork matches frame ratio)
#   fit      — maintain aspect ratio, letterbox with white padding
#   fill     — maintain aspect ratio, crop to fill
# ─────────────────────────────────────────────────────────────

output_dir: output

variants:
  - name: white_frame
    template: templates/white_frame.png
    fit_mode: stretch
    placement:
      x: 120       # pixels from left edge of template
      y: 85        # pixels from top edge of template
      width: 760   # width of artwork area
      height: 875  # height of artwork area

  - name: black_frame
    template: templates/black_frame.png
    fit_mode: stretch
    placement:
      x: 130
      y: 80
      width: 740
      height: 870

  # Add your remaining variants below.
  # Copy and paste a block, update name/template/placement for each.

